    <style>
        :root {
            --nier-beige: #bab5a1;
            --nier-dark: #353530;
            --nier-accent: #8e8a78;
            --nier-white: #e6e5d8;
            --mx: 50%;
            --my: 50%;
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--nier-dark); 
            color: var(--nier-beige);
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* 常に表示される走査線 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none; z-index: 100;
            opacity: 0.4;
        }

        h1 {
            background: var(--nier-beige); color: var(--nier-dark);
            padding: 15px; margin: 0; 
            font-size: 1.1rem; font-weight: normal;
            text-align: center; cursor: pointer; user-select: none;
            border-bottom: 4px solid var(--nier-accent);
            position: sticky; top: 0; z-index: 500;
            text-transform: uppercase;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; padding: 20px;
        }

        .expandable {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border: 1px solid var(--nier-beige);
            filter: sepia(0.3) contrast(1.1);
            -webkit-touch-callout: none;
            cursor: pointer;
        }

        /* スキャナー */
        #scanner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; opacity: 0;
            transition: opacity 0.2s;
        }
        #scanner-overlay.active { opacity: 1; }
        #scanner-overlay::before { content: ""; position: absolute; top: 0; left: var(--mx); width: 0.5px; height: 100%; background: var(--nier-beige); }
        #scanner-overlay::after { content: ""; position: absolute; top: var(--my); left: 0; width: 100%; height: 1px; background: var(--nier-beige); }

        .scan-data {
            position: absolute; top: calc(var(--my) + 15px); left: calc(var(--mx) + 15px);
            color: var(--nier-white); font-size: 0.5rem; line-height: 1.4;
            background: rgba(53, 53, 48, 0.7); padding: 4px;
            border-left: 2px solid var(--nier-beige);
        }

        #loading-bar { position: fixed; bottom: 0; left: 0; height: 2px; background: var(--nier-white); width: 0%; z-index: 10005; }

        /* --- 修正：スマホで見切れない解除演出 --- */
        #override-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nier-beige); 
            display: none; 
            z-index: 30000;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--nier-dark); 
            padding: 20px;
            box-sizing: border-box; 
            text-align: center;
        }

        .log-group {
            display: inline-block;
            text-align: left;
            max-width: 90%;
        }

        .log-line {
            font-size: 4.5vw; /* 画面幅に合わせて伸縮 */
            line-height: 1.8;
            word-break: break-all;
            font-weight: bold;
        }

        @media (min-width: 600px) { .log-line { font-size: 1.2rem; } }

        /* --- 追加：ノイズ（砂嵐）演出 --- */
        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            opacity: 0; pointer-events: none; z-index: 20000; mix-blend-mode: overlay;
        }
        .noise-active { opacity: 0.15 !important; }

        .modal {
            display: none; position: fixed; z-index: 10000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(53, 53, 48, 0.98); align-items: center; justify-content: center;
        }
        .modal-content { max-width: 90vw; max-height: 80vh; border: 1px solid var(--nier-beige); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: var(--nier-beige); font-size: 30px; padding: 20px; z-index: 10010; cursor: pointer; }
        .prev { left: 0; } .next { right: 0; }
        .show { display: flex !important; }
        .vibrate { animation: vibrate-anim 0.1s linear infinite; }
        @keyframes vibrate-anim { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0); } }
        
        .blink { animation: blink-anim 0.4s infinite; }
        @keyframes blink-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>

    <span class="nav-btn prev" id="prevBtn">◁</span>
    <div id="modal-content-wrapper" style="display:contents;"></div>
    <span class="nav-btn next" id="nextBtn">▷</span>

<script>
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const loaderBar = document.getElementById("loading-bar");
    const body = document.getElementById("mainBody");
    const scanner = document.getElementById("scanner-overlay");
    const scanData = document.getElementById("scan-data");
    const overrideOverlay = document.getElementById("override-overlay");
    const noiseOverlay = document.getElementById("noise-overlay");
    const galleryContainer = document.getElementById("galleryContainer");
    
    let adminMode = false;
    let tapCount = 0;
    let currentIndex = 0;

    // --- スキャナー制御 ---
    const updateScanner = (e) => {
        const touch = e.touches[0];
        const px = (touch.clientX / window.innerWidth) * 100;
        const py = (touch.clientY / window.innerHeight) * 100;
        document.documentElement.style.setProperty('--mx', px + '%');
        document.documentElement.style.setProperty('--my', py + '%');
        scanData.innerHTML = `LOC_ID: 0x${Math.round(touch.clientX).toString(16).toUpperCase()}<br>ANALYZING...`;
    };

    document.addEventListener("touchstart", (e) => {
        if (!modal.classList.contains("show")) {
            scanner.classList.add("active");
            updateScanner(e);
        }
    }, { passive: false });

    document.addEventListener("touchmove", (e) => {
        if (scanner.classList.contains("active")) updateScanner(e);
    }, { passive: false });

    document.addEventListener("touchend", () => scanner.classList.remove("active"));

    // --- 解除演出（スマホ対応版） ---
    document.getElementById("galleryTitle").onclick = () => {
        tapCount++;
        if (tapCount === 3) {
            adminMode = true;
            body.classList.add("vibrate");
            overrideOverlay.style.display = "flex";
            overrideOverlay.innerHTML = `
                <div class="log-group">
                    <div class="log-line">> SYNCING_WITH_BUNKER...</div>
                    <div class="log-line">> AUTHENTICATING...</div>
                    <div class="log-line">> ACCESS_GRANTED.</div>
                    <div class="log-line" style="color:#666; margin-top:10px;">STATUS: <span class="blink">UNLOCKED</span></div>
                </div>`;
            
            setTimeout(() => {
                body.classList.remove("vibrate");
                overrideOverlay.style.display = "none";
            }, 2000);
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 500);
    };

    // --- ギャラリー＆ノイズ演出 ---
    galleryContainer.onclick = (e) => {
        const target = e.target.closest(".expandable");
        if (!target) return;

        const allItems = Array.from(document.querySelectorAll(".expandable"));
        currentIndex = allItems.indexOf(target);

        // ロード開始時にノイズを表示
        noiseOverlay.classList.add("noise-active");
        loaderBar.style.width = "0%";
        
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 30;
            loaderBar.style.width = Math.min(w, 100) + "%";
            if (w >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loaderBar.style.width = "0%";
                    noiseOverlay.classList.remove("noise-active"); // ロード完了でノイズ消去
                    modal.classList.add("show");
                    updateModal(allItems);
                }, 300);
            }
        }, 60);
    };

    function updateModal(allItems) {
        const target = allItems[currentIndex];
        wrapper.innerHTML = "";
        if (target.tagName === "IMG") {
            wrapper.innerHTML = `<img src="${target.dataset.full || target.src}" class="modal-content">`;
        } else {
            wrapper.innerHTML = `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    // 次へ・前へボタン
    document.getElementById("nextBtn").onclick = (e) => {
        e.stopPropagation();
        const allItems = Array.from(document.querySelectorAll(".expandable"));
        currentIndex = (currentIndex + 1) % allItems.length;
        updateModal(allItems);
    };

    document.getElementById("prevBtn").onclick = (e) => {
        e.stopPropagation();
        const allItems = Array.from(document.querySelectorAll(".expandable"));
        currentIndex = (currentIndex - 1 + allItems.length) % allItems.length;
        updateModal(allItems);
    };

    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("show"); };
    document.addEventListener('contextmenu', e => { if (!adminMode) e.preventDefault(); });
</script>
