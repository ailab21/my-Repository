    <style>
        :root {
            --nier-beige: #bab5a1;
            --nier-dark: #353530;
            --nier-accent: #8e8a78;
            --nier-white: #e6e5d8;
            --mx: 50%; --my: 50%;
        }

        body {
            margin: 0; padding: 0; 
            background-color: #2a2a25; /* 少し深く暗い色に */
            color: var(--nier-beige);
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* --- ガラスの反射・質感レイヤー（最前面） --- */
        .glass-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(255,255,255,0.02) 100%),
                radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.3) 100%);
            pointer-events: none; z-index: 2000;
        }

        /* 常に表示される走査線（中層） */
        .scanlines {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none; z-index: 100; opacity: 0.4;
        }

        /* --- 視差レイヤー構造 --- */
        #content-wrapper {
            position: relative;
            z-index: 10;
            will-change: transform;
        }

        h1 {
            background: var(--nier-beige); color: var(--nier-dark);
            padding: 15px; margin: 0; font-size: 1.1rem; text-align: center;
            cursor: pointer; user-select: none; border-bottom: 4px solid var(--nier-accent);
            position: sticky; top: 0; z-index: 500; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; padding: 20px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .expandable { 
            width: 100%; aspect-ratio: 1/1; object-fit: cover; 
            border: 1px solid rgba(186, 181, 161, 0.4); 
            filter: sepia(0.3) contrast(1.1) brightness(0.9); 
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .expandable:hover {
            filter: sepia(0) contrast(1.2) brightness(1);
            transform: translateZ(20px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        /* モーダル・起動演出等は維持 */
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--nier-dark); color: var(--nier-beige); z-index: 50000; display: none; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box; overflow: hidden; font-size: 0.8rem; }
        .boot-log { animation: slide-up 0.1s forwards; margin-bottom: 2px; }
        @keyframes slide-up { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 0.8; } }
        
        #scanner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1500; opacity: 0; transition: opacity 0.2s; }
        #scanner-overlay.active { opacity: 1; }
        #scanner-overlay::before { content: ""; position: absolute; top: 0; left: var(--mx); width: 0.5px; height: 100%; background: var(--nier-beige); }
        #scanner-overlay::after { content: ""; position: absolute; top: var(--my); left: 0; width: 100%; height: 1px; background: var(--nier-beige); }

        .modal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 30, 25, 0.98); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { max-width: 90vw; max-height: 80vh; border: 1px solid var(--nier-beige); box-shadow: 0 0 50px rgba(0,0,0,1); }
        #noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); opacity: 0; pointer-events: none; z-index: 20000; mix-blend-mode: overlay; }
        .noise-active { opacity: 0.1 !important; }
        #loading-bar { position: fixed; bottom: 0; left: 0; height: 2px; background: var(--nier-white); width: 0%; z-index: 10005; }
    </style>
</head>

<script>
    const wrapper = document.getElementById("content-wrapper");
    const title = document.getElementById("galleryTitle");

    // --- 1. スクロール連動擬似パララックス ---
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        // 背景とコンテンツをわずかにずらして奥行きを出す
        // タイトルは固定、ギャラリーは標準、背景(走査線)は固定
        // ここではギャラリー内のアイテムに微細な視差を与えます
        const items = document.querySelectorAll('.expandable');
        items.forEach((item, index) => {
            const speed = 0.05;
            const yPos = -(scrolled * speed);
            // 偶数・奇数で動きを少し変えるとより立体的
            const shift = index % 2 === 0 ? yPos : -yPos;
            item.style.transform = `translateY(${shift * 0.2}px)`;
        });
    });

    // --- 2. 起動演出 ---
    window.addEventListener('DOMContentLoaded', () => {
        const bootScreen = document.getElementById("boot-screen");
        bootScreen.style.display = "flex";
        const logs = ["ARCHIVE_ACCESS_START", "DECRYPTING...", `USER_ID: ${userID.toUpperCase()}`, "SUCCESS."];
        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                const div = document.createElement("div");
                div.className = "boot-log"; div.innerText = `> ${logs[i]}`;
                bootScreen.appendChild(div); i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    bootScreen.style.opacity = "0";
                    bootScreen.style.transition = "opacity 0.8s";
                    setTimeout(() => bootScreen.style.display = "none", 800);
                }, 800);
            }
        }, 150);
    });

    // --- 3. スキャナー & モーダル機能 (既存) ---
    const updateScanner = (e) => {
        const touch = e.touches ? e.touches[0] : e;
        document.documentElement.style.setProperty('--mx', (touch.clientX / window.innerWidth) * 100 + '%');
        document.documentElement.style.setProperty('--my', (touch.clientY / window.innerHeight) * 100 + '%');
    };
    document.addEventListener("touchstart", (e) => { document.getElementById("scanner-overlay").classList.add("active"); updateScanner(e); });
    document.addEventListener("touchmove", updateScanner);
    document.addEventListener("touchend", () => document.getElementById("scanner-overlay").classList.remove("active"));

    const modal = document.getElementById("modal");
    const modalWrapper = document.getElementById("modal-content-wrapper");
    const noise = document.getElementById("noise-overlay");
    
    document.getElementById("galleryContainer").onclick = (e) => {
        const target = e.target.closest(".expandable");
        if (!target) return;
        noise.classList.add("noise-active");
        setTimeout(() => {
            noise.classList.remove("noise-active");
            modal.style.display = "flex";
            modalWrapper.innerHTML = target.tagName === "IMG" ? `<img src="${target.dataset.full || target.src}" class="modal-content">` : `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
        }, 300);
    };
    modal.onclick = () => modal.style.display = "none";
</script>
