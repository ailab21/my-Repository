<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Gallery</title>

    <script>
        const password = "2037";
        let input = prompt("4桁の数字パスワードを入力してください");
        if (input !== password) {
            alert("ACCESS DENIED");
            location.href = "https://www.pixiv.net/dashboard/works";
        }
    </script>

    <style>
        :root {
            --neon: #7FFF00;
            --cyber-blue: #00ffff;
            --error-red: #ff003c;
        }

        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff;
            font-family: 'Courier New', monospace; overflow-x: hidden;
        }

        /* 背景のスキャンライン（常時表示） */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(127, 255, 0, 0.02) 1px, transparent 1px);
            background-size: 100% 4px, 20px 20px;
            pointer-events: none; z-index: 100;
        }

        h1 {
            background: rgba(0,0,0,0.9); color: var(--neon); padding: 20px;
            margin: 0; border-bottom: 2px solid var(--neon); font-size: 1.5rem;
            text-align: center; cursor: pointer; user-select: none;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px; padding: 15px;
        }

        .expandable {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border: 1px solid rgba(127, 255, 0, 0.3);
            -webkit-touch-callout: none; /* 解除前は保存禁止 */
        }

        /* --- 強力なグリッチ演出用レイヤー --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 50000;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        .glitch-text {
            font-size: 2rem; color: var(--cyber-blue);
            text-shadow: 2px 0 var(--error-red), -2px 0 var(--neon);
            animation: text-glitch 0.1s infinite;
        }

        @keyframes text-glitch {
            0% { transform: skew(20deg); opacity: 0.8; }
            50% { transform: skew(-20deg); opacity: 1; }
            100% { transform: skew(0deg); }
        }

        /* 画面全体の揺れ演出 */
        .vibrate-effect {
            animation: screen-shake 0.1s infinite;
            filter: contrast(2) hue-rotate(90deg);
        }

        @keyframes screen-shake {
            0% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            100% { transform: translate(0); }
        }

        /* モーダル（拡大画面） */
        .modal {
            display: none; position: fixed; z-index: 10000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
        }
        .modal-content { max-width: 85vw; max-height: 80vh; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: var(--neon); font-size: 50px; padding: 20px; z-index: 10010; }
        .prev { left: 5px; } .next { right: 5px; }

        .show { display: flex !important; }
    </style>
</head>
<body id="mainBody">

<div id="glitch-overlay">
    <div class="glitch-text">CRACKING SYSTEM...</div>
</div>

<h1 id="galleryTitle">SECRET_GALLERY_OS</h1>

<div class="gallery">
    <!-- 画像・動画リスト（必要分追加してください） -->
    <img src="thumb_20260316001.jpg" data-full="20260316001.png" class="expandable">
    <video src="20260316001move.mp4#t=0.1" class="expandable" muted loop playsinline></video>
</div>

<div id="modal" class="modal">
    <span class="nav-btn prev" id="prevBtn">◂</span>
    <div id="modal-content-wrapper" style="display:contents;"></div>
    <span class="nav-btn next" id="nextBtn">▸</span>
</div>

<script>
    const title = document.getElementById("galleryTitle");
    const overlay = document.getElementById("glitch-overlay");
    const body = document.getElementById("mainBody");
    const items = document.querySelectorAll(".expandable");
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");

    let adminMode = false;
    let tapCount = 0;
    let tapTimer;

    // --- 3タップでノイズ演出＆解除 ---
    title.addEventListener("click", () => {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 500);

        if (tapCount === 3) {
            adminMode = true;
            runGlitchSequence();
            tapCount = 0;
        }
    });

    function runGlitchSequence() {
        // 1. ノイズレイヤーを表示し、画面を揺らす
        overlay.style.display = "flex";
        body.classList.add("vibrate-effect");

        // 2. 1.5秒後に演出を終了してギャラリーに戻す
        setTimeout(() => {
            overlay.style.display = "none";
            body.classList.remove("vibrate-effect");
            alert("OVERRIDE COMPLETE: DOWNLOAD ENABLED");
        }, 1500);
    }

    // --- ギャラリー基本機能 ---
    let currentIndex = 0;
    function updateModal(index) {
        currentIndex = index;
        const target = items[currentIndex];
        wrapper.innerHTML = "";
        if (target.tagName === "IMG") {
            wrapper.innerHTML = `<img src="${target.dataset.full || target.src}" class="modal-content">`;
        } else {
            wrapper.innerHTML = `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    items.forEach((item, index) => {
        item.onclick = () => {
            modal.classList.add("show");
            updateModal(index);
        };
    });

    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % items.length; updateModal(currentIndex); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + items.length) % items.length; updateModal(currentIndex); };
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("show"); };

    // 右クリック/長押し制限
    document.addEventListener('contextmenu', e => {
        if (!adminMode) e.preventDefault();
    });
</script>

</body>
</html>
