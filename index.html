    <style>
        :root {
            /* NieR:Automata カラーパレット */
            --nier-beige: #bab5a1;
            --nier-dark: #353530;
            --nier-accent: #8e8a78;
            --nier-white: #e6e5d8;
            --mx: 50%;
            --my: 50%;
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--nier-dark); 
            color: var(--nier-beige);
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* 背景：薄い走査線（常に表示） */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none; z-index: 100;
            opacity: 0.4;
        }

        h1 {
            background: var(--nier-beige); color: var(--nier-dark);
            padding: 15px; margin: 0; 
            font-size: 1.1rem; font-weight: normal;
            text-align: center; cursor: pointer; user-select: none;
            border-bottom: 4px solid var(--nier-accent);
            position: sticky; top: 0; z-index: 500;
            text-transform: uppercase;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; padding: 20px;
        }

        .expandable {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border: 1px solid var(--nier-beige);
            filter: sepia(0.3) contrast(1.1);
            -webkit-touch-callout: none;
            transition: opacity 0.2s;
        }
        .expandable:active { opacity: 0.7; }

        /* --- 指追従スキャン演出（NieRスタイル） --- */
        #scanner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; opacity: 0;
            transition: opacity 0.2s;
        }
        #scanner-overlay.active { opacity: 1; }

        #scanner-overlay::before { /* 縦線 */
            content: ""; position: absolute; top: 0; left: var(--mx);
            width: 0.5px; height: 100%; background: var(--nier-beige);
        }
        #scanner-overlay::after { /* 横線 */
            content: ""; position: absolute; top: var(--my); left: 0;
            width: 100%; height: 1px; background: var(--nier-beige);
        }

        .scan-data {
            position: absolute; top: calc(var(--my) + 15px); left: calc(var(--mx) + 15px);
            color: var(--nier-white); font-size: 0.5rem; line-height: 1.4;
            background: rgba(53, 53, 48, 0.7); padding: 4px;
            border-left: 2px solid var(--nier-beige);
        }

        /* プログレスバー（NieR風） */
        #loading-bar {
            position: fixed; bottom: 0; left: 0; height: 2px;
            background: var(--nier-white); width: 0%; z-index: 10005;
        }

        /* 3タップ解除時のOSオーバーレイ */
        #override-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nier-beige); display: none; z-index: 30000;
            flex-direction: column; align-items: flex-start; justify-content: center;
            color: var(--nier-dark); padding: 10%;
            box-sizing: border-box; font-size: 0.9rem; line-height: 1.6;
        }

        .log-line::before { content: "> "; }
        .blink { animation: blink-anim 0.5s infinite; }
        @keyframes blink-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* モーダル */
        .modal {
            display: none; position: fixed; z-index: 10000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(53, 53, 48, 0.98); align-items: center; justify-content: center;
        }
        .modal-content { 
            max-width: 90vw; max-height: 80vh; 
            border: 1px solid var(--nier-beige);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: var(--nier-beige); font-size: 30px; padding: 20px; z-index: 10010;
        }
        .prev { left: 0; } .next { right: 0; }

        .show { display: flex !important; }
        
        /* 振動演出 */
        .vibrate { animation: vibrate-anim 0.1s linear infinite; }
        @keyframes vibrate-anim {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>

<script>
    const items = document.querySelectorAll(".expandable");
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const loaderBar = document.getElementById("loading-bar");
    const body = document.getElementById("mainBody");
    const scanner = document.getElementById("scanner-overlay");
    const scanData = document.getElementById("scan-data");
    const overrideOverlay = document.getElementById("override-overlay");
    
    let adminMode = false;
    let tapCount = 0;

    // --- 1. NieR風スキャン演出 ---
    const updateScanner = (e) => {
        const x = e.touches[0].clientX;
        const y = e.touches[0].clientY;
        const px = (x / window.innerWidth) * 100;
        const py = (y / window.innerHeight) * 100;
        document.documentElement.style.setProperty('--mx', px + '%');
        document.documentElement.style.setProperty('--my', py + '%');
        
        const hexX = Math.round(x).toString(16).toUpperCase();
        const hexY = Math.round(y).toString(16).toUpperCase();
        scanData.innerHTML = `LOC_ID: 0x${hexX}${hexY}<br>TYPE: ARCHIVE_DATA<br>ANALYZING...`;
    };

    document.addEventListener("touchstart", (e) => {
        if (!modal.classList.contains("show")) {
            scanner.classList.add("active");
            updateScanner(e);
        }
    }, { passive: false });

    document.addEventListener("touchmove", (e) => {
        if (scanner.classList.contains("active")) updateScanner(e);
    }, { passive: false });

    document.addEventListener("touchend", () => scanner.classList.remove("active"));

    // --- 2. 解除演出（バンカー同期風） ---
    document.getElementById("galleryTitle").onclick = (e) => {
        e.stopPropagation();
        tapCount++;
        if (tapCount === 3) {
            adminMode = true;
            runNierOverride();
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 500);
    };

    function runNierOverride() {
        body.classList.add("vibrate");
        overrideOverlay.style.display = "flex";
        overrideOverlay.innerHTML = `
            <div class="log-line">Initializing system override...</div>
            <div class="log-line">Bypassing YoRHa security protocols...</div>
            <div class="log-line">Synchronizing with Bunker... DONE</div>
            <div class="log-line">All restrictions lifted. <span class="blink">■</span></div>
        `;
        
        setTimeout(() => {
            body.classList.remove("vibrate");
            overrideOverlay.style.display = "none";
        }, 1500);
    }

    // --- 3. ロード演出 ---
    function startLoading() {
        loaderBar.style.width = "0%";
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 30;
            loaderBar.style.width = Math.min(w, 100) + "%";
            if (w >= 100) {
                clearInterval(interval);
                setTimeout(() => loaderBar.style.width = "0%", 200);
            }
        }, 50);
    }

    // ギャラリー基本機能
    let currentIndex = 0;
    items.forEach((item, index) => {
        item.onclick = (e) => {
            e.stopPropagation();
            startLoading();
            setTimeout(() => {
                modal.classList.add("show");
                updateModal(index);
            }, 400);
        };
    });

    function updateModal(index) {
        currentIndex = index;
        const target = items[currentIndex];
        wrapper.innerHTML = "";
        if (target.tagName === "IMG") {
            wrapper.innerHTML = `<img src="${target.dataset.full || target.src}" class="modal-content">`;
        } else {
            wrapper.innerHTML = `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % items.length; updateModal(currentIndex); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + items.length) % items.length; updateModal(currentIndex); };
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("show"); };

    document.addEventListener('contextmenu', e => { if (!adminMode) e.preventDefault(); });
</script>
