    <script>
        const password = "2037";

        if (input !== password) {

    <style>
        :root {
            --nier-beige: #bab5a1;
            --nier-dark: #353530;
            --nier-accent: #8e8a78;
            --nier-white: #e6e5d8;
            --mx: 50%;
            --my: 50%;
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--nier-dark); 
            color: var(--nier-beige);
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* 常に表示される走査線 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none; z-index: 100; opacity: 0.4;
        }

        /* --- 起動演出用スタイル --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nier-dark); color: var(--nier-beige);
            z-index: 50000; display: none; flex-direction: column;
            justify-content: flex-end; padding: 20px; box-sizing: border-box;
            overflow: hidden; font-size: 0.8rem;
        }
        .boot-log { animation: slide-up 0.1s forwards; opacity: 0.8; margin-bottom: 2px; }
        @keyframes slide-up { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 0.8; } }

        h1 {
            background: var(--nier-beige); color: var(--nier-dark);
            padding: 15px; margin: 0; font-size: 1.1rem; text-align: center;
            cursor: pointer; user-select: none; border-bottom: 4px solid var(--nier-accent);
            position: sticky; top: 0; z-index: 500; text-transform: uppercase;
        }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px; }
        .expandable { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid var(--nier-beige); filter: sepia(0.3) contrast(1.1); cursor: pointer; }

        /* スキャナー */
        #scanner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; opacity: 0; transition: opacity 0.2s; }
        #scanner-overlay.active { opacity: 1; }
        #scanner-overlay::before { content: ""; position: absolute; top: 0; left: var(--mx); width: 0.5px; height: 100%; background: var(--nier-beige); }
        #scanner-overlay::after { content: ""; position: absolute; top: var(--my); left: 0; width: 100%; height: 1px; background: var(--nier-beige); }

        /* ハッキング解除画面 */
        #override-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nier-beige); display: none; z-index: 30000;
            flex-direction: column; align-items: center; justify-content: center;
            color: var(--nier-dark); padding: 20px; box-sizing: border-box; text-align: center;
        }

        .log-line { font-size: 4.5vw; line-height: 1.8; font-weight: bold; }
        @media (min-width: 600px) { .log-line { font-size: 1.2rem; } }

        #noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); opacity: 0; pointer-events: none; z-index: 20000; mix-blend-mode: overlay; }
        .noise-active { opacity: 0.15 !important; }

        .modal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(53, 53, 48, 0.98); align-items: center; justify-content: center; }
        .modal-content { max-width: 90vw; max-height: 80vh; border: 1px solid var(--nier-beige); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: var(--nier-beige); font-size: 30px; padding: 20px; z-index: 10010; cursor: pointer; }
        .show { display: flex !important; }
        .vibrate { animation: vibrate-anim 0.1s linear infinite; }
        @keyframes vibrate-anim { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0); } }
        .blink { animation: blink-anim 0.4s infinite; }
        @keyframes blink-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #loading-bar { position: fixed; bottom: 0; left: 0; height: 2px; background: var(--nier-white); width: 0%; z-index: 10005; }
    </style>
</head>

<script>
    const bootScreen = document.getElementById("boot-screen");
    const overrideOverlay = document.getElementById("override-overlay");
    const body = document.getElementById("mainBody");

    // --- 1. 起動演出の実行 ---
    window.addEventListener('DOMContentLoaded', () => {
        bootScreen.style.display = "flex";
        const logs = [
            "SYSTEM_BOOT_SEQUENCE_START",
            "INITIALIZING UNIT ARCHIVE...",
            "CONNECTING TO BUNKERS... [OK]",
            `CHECKING_ID: ${userID.toUpperCase()}`,
            "AUTHENTICATION_SUCCESSFUL",
            "LOADING_CORE_SYSTEM_V3.02...",
            "DECRYPTING_VISUAL_DATA...",
            "MEMORY_SECTOR_SCAN... 100%",
            "ESTABLISHING_SECURE_LINK...",
            "READY.",
            `WELCOME, ${userID.toUpperCase()}`
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                const div = document.createElement("div");
                div.className = "boot-log";
                div.innerText = `> ${logs[i]}`;
                bootScreen.appendChild(div);
                if (bootScreen.childNodes.length > 25) bootScreen.removeChild(bootScreen.firstChild);
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    bootScreen.style.opacity = "0";
                    bootScreen.style.transition = "opacity 0.8s";
                    setTimeout(() => bootScreen.style.display = "none", 800);
                }, 1200);
            }
        }, 100);
    });

    // --- 2. ロック解除演出（修正版：何度でも動く） ---
    let tapCount = 0;
    let adminMode = false;
    document.getElementById("galleryTitle").onclick = () => {
        tapCount++;
        if (tapCount === 3) {
            adminMode = true;
            overrideOverlay.innerHTML = ""; // 毎回リセット
            overrideOverlay.style.display = "flex";
            body.classList.add("vibrate");

            overrideOverlay.innerHTML = `
                <div class="log-group">
                    <div class="log-line">> SYNCING_WITH_BUNKER...</div>
                    <div class="log-line">> AUTHENTICATING...</div>
                    <div class="log-line">> ACCESS_GRANTED.</div>
                    <div class="log-line" style="color:#666; margin-top:10px;">STATUS: <span class="blink">UNLOCKED</span></div>
                </div>`;

            setTimeout(() => {
                body.classList.remove("vibrate");
                overrideOverlay.style.display = "none";
            }, 2000);
            tapCount = 0;
        }
        setTimeout(() => { if(tapCount < 3) tapCount = 0; }, 500);
    };

    // --- 3. ギャラリー・モーダル・スキャナー (既存機能) ---
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const loaderBar = document.getElementById("loading-bar");
    const noiseOverlay = document.getElementById("noise-overlay");
    const galleryContainer = document.getElementById("galleryContainer");
    let currentIndex = 0;

    const updateScanner = (e) => {
        const touch = e.touches[0];
        document.documentElement.style.setProperty('--mx', (touch.clientX / window.innerWidth) * 100 + '%');
        document.documentElement.style.setProperty('--my', (touch.clientY / window.innerHeight) * 100 + '%');
        document.getElementById("scan-data").innerHTML = `LOC_ID: 0x${Math.round(touch.clientX).toString(16).toUpperCase()}<br>USER: ${userID.toUpperCase()}`;
    };
    document.addEventListener("touchstart", (e) => { if (!modal.classList.contains("show")) { document.getElementById("scanner-overlay").classList.add("active"); updateScanner(e); } });
    document.addEventListener("touchmove", (e) => { if (document.getElementById("scanner-overlay").classList.contains("active")) updateScanner(e); });
    document.addEventListener("touchend", () => document.getElementById("scanner-overlay").classList.remove("active"));

    galleryContainer.onclick = (e) => {
        const target = e.target.closest(".expandable");
        if (!target) return;
        const allItems = Array.from(document.querySelectorAll(".expandable"));
        currentIndex = allItems.indexOf(target);
        noiseOverlay.classList.add("noise-active");
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 40;
            loaderBar.style.width = Math.min(w, 100) + "%";
            if (w >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loaderBar.style.width = "0%";
                    noiseOverlay.classList.remove("noise-active");
                    modal.classList.add("show");
                    updateModal(allItems);
                }, 300);
            }
        }, 70);
    };

    function updateModal(allItems) {
        const target = allItems[currentIndex];
        wrapper.innerHTML = target.tagName === "IMG" ? 
            `<img src="${target.dataset.full || target.src}" class="modal-content">` : 
            `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
    }

    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % document.querySelectorAll(".expandable").length; updateModal(Array.from(document.querySelectorAll(".expandable"))); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + document.querySelectorAll(".expandable").length) % document.querySelectorAll(".expandable").length; updateModal(Array.from(document.querySelectorAll(".expandable"))); };
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("show"); };
    document.addEventListener('contextmenu', e => { if (!adminMode) e.preventDefault(); });
</script>
