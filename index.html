    <style>
        :root {
            --neon: #7FFF00;
            --cyber-blue: #00ffff;
        }

        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff;
            font-family: 'Courier New', monospace; overflow-x: hidden;
            transition: filter 0.1s ease; /* 振動演出用 */
        }

        /* 1. スキャンライン & グリッド背景 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(127, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(127, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 100% 4px, 30px 30px, 30px 30px;
            pointer-events: none; z-index: 100;
        }

        h1 {
            background: rgba(0,0,0,0.9); color: var(--neon); padding: 20px;
            margin: 0; border-bottom: 2px solid var(--neon); font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon); position: sticky; top: 0; z-index: 500;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px; padding: 15px; perspective: 1000px; /* 3. ジャイロ連動用 */
        }

        .expandable {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border: 1px solid rgba(127, 255, 0, 0.3); border-radius: 2px;
            transition: transform 0.1s ease-out; /* ジャイロで動く */
            -webkit-touch-callout: none;
        }

        /* 2. プログレスバー */
        #loading-bar {
            position: fixed; bottom: 0; left: 0; height: 3px;
            background: var(--cyber-blue); width: 0%; z-index: 10005;
            box-shadow: 0 0 10px var(--cyber-blue);
        }

        /* 4. 視覚的振動（グリッチ） */
        .glitch-vibrate {
            animation: v-shake 0.15s linear infinite;
            filter: hue-rotate(90deg) contrast(1.5);
        }
        @keyframes v-shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(0); }
        }

        /* モーダル */
        .modal {
            display: none; position: fixed; z-index: 10000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); align-items: center; justify-content: center;
        }
        .modal-content { max-width: 90vw; max-height: 80vh; transition: 0.3s; }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: var(--neon); font-size: 40px; padding: 20px; z-index: 10010;
        }
        .prev { left: 0; } .next { right: 0; }

        #override-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 30000;
            flex-direction: column; align-items: center; justify-content: center;
            color: var(--cyber-blue); font-weight: bold;
        }

        .show { display: flex !important; }
    </style>
</head>

    <div id="modal-content-wrapper" style="display:contents;"></div>
    <span class="nav-btn next" id="nextBtn">▸</span>

<script>
    const items = document.querySelectorAll(".expandable");
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const loaderBar = document.getElementById("loading-bar");
    const body = document.getElementById("mainBody");
    let adminMode = false;
    let tapCount = 0;

    // --- ジャイロセンサーの有効化 (iOS/Android対応) ---
    async function requestDeviceOrientation() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS用：許可を求める
            try {
                const permissionState = await DeviceOrientationEvent.requestPermission();
                if (permissionState === 'granted') {
                    window.addEventListener("deviceorientation", handleOrientation);
                }
            } catch (error) {
                console.error("センサー許可エラー:", error);
            }
        } else {
            // Android/PC用：そのまま登録
            window.addEventListener("deviceorientation", handleOrientation);
        }
    }

    function handleOrientation(e) {
        // adminMode（3タップ解除後）に連動させる場合はここを調整
        // 今回は「常に動く」ように設定して動作確認しやすくします
        const tiltX = Math.min(Math.max(e.gamma, -25), 25) / 1.5; // 左右の傾き
        const tiltY = Math.min(Math.max(e.beta - 45, -25), 25) / 1.5; // 前後の傾き

        items.forEach(img => {
            // 奥行きを強調するために Z軸の移動も追加
            img.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg) translateZ(10px)`;
        });
    }

    // 画面のどこかを最初に触った時にセンサーを起動する
    document.body.addEventListener('click', requestDeviceOrientation, { once: true });

    // --- 1 & 4. 視覚的振動と解除演出 ---
    document.getElementById("galleryTitle").onclick = (e) => {
        e.stopPropagation(); // センサー起動と混ざらないように
        tapCount++;
        if (tapCount === 3) {
            adminMode = true;
            triggerGlitch();
            tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 500);
    };

    function triggerGlitch() {
        body.classList.add("glitch-vibrate");
        const overlay = document.getElementById("override-overlay");
        overlay.style.display = "flex";
        setTimeout(() => {
            body.classList.remove("glitch-vibrate");
            overlay.style.display = "none";
        }, 1500);
    }

    // --- 2. プログレスバー演出 ---
    function startLoading() {
        loaderBar.style.width = "0%";
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 40;
            loaderBar.style.width = w + "%";
            if (w >= 100) {
                clearInterval(interval);
                setTimeout(() => loaderBar.style.width = "0%", 200);
            }
        }, 40);
    }

    // ギャラリー基本機能
    let currentIndex = 0;
    items.forEach((item, index) => {
        item.onclick = (e) => {
            e.stopPropagation();
            startLoading();
            setTimeout(() => {
                modal.classList.add("show");
                updateModal(index);
            }, 2500); // 演出をしっかり見せるために少し遅延
        };
    });

    function updateModal(index) {
        currentIndex = index;
        const target = items[currentIndex];
        wrapper.innerHTML = "";
        if (target.tagName === "IMG") {
            wrapper.innerHTML = `<img src="${target.dataset.full || target.src}" class="modal-content">`;
        } else {
            wrapper.innerHTML = `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % items.length; updateModal(currentIndex); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + items.length) % items.length; updateModal(currentIndex); };
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("show"); };

    document.addEventListener('contextmenu', e => { if (!adminMode) e.preventDefault(); });
</script>
