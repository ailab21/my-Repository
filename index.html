<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ・ポートフォリオ</title>

    <script>
        // パスワードの設定（「1234」の部分を好きな言葉に変えてください）
        const password = "1234"; 
        
        // 画面が開いたときに入力欄を出す
        let input = prompt("パスワードを入力してください");

        // 正解しなかった場合
        if (input !== password) {
            alert("パスワードが違います。");
            // 別のサイト（例：Google）に飛ばす、または画面を白くする
            location.href = "https://www.google.com";
        }
    </script>
</head>
<head>
    <meta charset="UTF-8">
    <title>マイ・ギャラリー</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f0f0; }
        img { border: 10px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); max-width: 90%; }
    </style>
</head>
<body>
    <h1>こんにちは！私の画像です</h1>
    <img src="20260316001.png" alt="表示する画像">
</body>
</html>
