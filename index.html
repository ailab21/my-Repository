        :root {
            --nier-beige: #bab5a1;
            --nier-dark: #353530;
            --nier-accent: #8e8a78;
            --nier-white: #e6e5d8;
            --nixie-orange: #ffaa33;
            --mx: 50%; --my: 50%;
        }

        body {
            margin: 0; padding: 0; 
            background-color: #2a2a25; 
            color: var(--nier-beige);
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            letter-spacing: 0.05em;
        }

        /* --- ニキシー管時計（右上固定） --- */
        #nixie-clock {
            position: fixed;
            top: 12px; /* タイトルの高さに合わせて調整 */
            right: 15px;
            display: flex;
            gap: 4px;
            z-index: 10000; /* 最前面 */
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border: 1px solid rgba(186, 181, 161, 0.3);
            border-radius: 2px;
            pointer-events: none; /* 下の要素を触れるように */
        }

        .nixie-digit {
            font-size: 1.2rem; /* 少しコンパクトに */
            font-weight: bold;
            color: var(--nixie-orange);
            text-shadow: 0 0 5px #ff5500, 0 0 10px var(--nixie-orange);
            width: 16px;
            text-align: center;
        }

        .nixie-sep {
            font-size: 1rem;
            color: var(--nixie-orange);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        /* --- 起動ログ演出 --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nier-dark); color: var(--nier-beige);
            z-index: 50000; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; transition: opacity 0.8s;
        }
        #boot-log-container { width: 100%; max-width: 400px; text-align: left; margin-top: -10vh; }
        .boot-log { animation: slide-up 0.1s forwards; margin-bottom: 4px; border-left: 2px solid var(--nier-accent); padding-left: 10px; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 0.9; } }

        /* --- ガラス・走査線 --- */
        .glass-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(255,255,255,0.02) 100%), radial-gradient(circle at 50% 50%, transparent 65%, rgba(0,0,0,0.4) 100%); pointer-events: none; z-index: 2000; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%); background-size: 100% 2px; pointer-events: none; z-index: 100; opacity: 0.4; }

        /* --- メインUI --- */
        h1 { background: var(--nier-beige); color: var(--nier-dark); padding: 15px; margin: 0; font-size: 1rem; text-align: left; padding-left: 20px; cursor: pointer; user-select: none; border-bottom: 4px solid var(--nier-accent); position: sticky; top: 0; z-index: 500; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px; }
        .expandable { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid rgba(186, 181, 161, 0.4); filter: sepia(0.3) brightness(0.8); cursor: pointer; transition: transform 0.2s; }

        /* --- モーダル --- */
        .modal { display: none; position: fixed; z-index: 20000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30,30,25,0.98); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { max-width: 90vw; max-height: 80vh; border: 1px solid var(--nier-beige); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: var(--nier-beige); font-size: 40px; padding: 20px; z-index: 20010; cursor: pointer; user-select: none; text-shadow: 0 0 10px rgba(186, 181, 161, 0.5); }
    </style>

<script>
    // --- 時計更新ロジック ---
    function updateNixieClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('h1').innerText = h[0];
        document.getElementById('h2').innerText = h[1];
        document.getElementById('m1').innerText = m[0];
        document.getElementById('m2').innerText = m[1];
        document.getElementById('s1').innerText = s[0];
        document.getElementById('s2').innerText = s[1];
    }
    setInterval(updateNixieClock, 1000);
    updateNixieClock();

    // --- 起動演出 ---
    window.addEventListener('DOMContentLoaded', () => {
        const bootScreen = document.getElementById("boot-screen");
        const logContainer = document.getElementById("boot-log-container");
        bootScreen.style.display = "flex";
        const logs = ["PORTAL_BOOT...", `ID: ${userID.toUpperCase()}`, "SYNCING...", "READY."];
        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                const div = document.createElement("div");
                div.className = "boot-log"; div.innerText = `> ${logs[i]}`;
                logContainer.appendChild(div); i++;
            } else {
                clearInterval(interval);
                setTimeout(() => { bootScreen.style.opacity = "0"; setTimeout(() => bootScreen.style.display = "none", 800); }, 1000);
            }
        }, 300);
    });

    // --- モーダル・ギャラリー制御 ---
    const modal = document.getElementById("modal");
    const modalWrapper = document.getElementById("modal-content-wrapper");
    const galleryItems = () => Array.from(document.querySelectorAll(".expandable"));
    let currentIndex = 0;

    const updateModalContent = () => {
        const items = galleryItems();
        const target = items[currentIndex];
        modalWrapper.innerHTML = target.tagName === "IMG" ? 
            `<img src="${target.dataset.full || target.src}" class="modal-content">` : 
            `<video src="${target.src}" class="modal-content" controls autoplay loop playsinline></video>`;
    };

    document.getElementById("galleryContainer").onclick = (e) => {
        const target = e.target.closest(".expandable");
        if (!target) return;
        currentIndex = galleryItems().indexOf(target);
        modal.style.display = "flex";
        updateModalContent();
    };

    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % galleryItems().length; updateModalContent(); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + galleryItems().length) % galleryItems().length; updateModalContent(); };
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
</script>
