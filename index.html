<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Gallery</title>

    <script>
        // --- パスワード制御 ---
        const password = "2037";
        let input = prompt("4桁の数字パスワードを入力してください");

        if (input !== password) {
            alert("パスワードが違います。どれかのwallpaper作品に隠されてるよ!");
            location.href = "https://www.pixiv.net/dashboard/works";
        }

    <style>
        /* --- 演出用：オーバーレイ (解除時のみ使用) --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: none; /* 初期状態は非表示 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            transition: opacity 1s ease;
            overflow: hidden;
        }

        #loading-overlay::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 20001;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 20px;
            background: rgba(127, 255, 0, 0.4);
            box-shadow: 0 0 30px #7FFF00;
            position: absolute;
            top: -30px;
            left: 0;
            z-index: 20002;
            pointer-events: none;
        }

        .scan-animate {
            animation: scan-move 2.5s cubic-bezier(0.15, 0.44, 0.76, 0.64) forwards;
        }

        @keyframes scan-move {
            0% { top: -30px; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .glitch-flash {
            animation: glitch-anim 0.15s linear infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translateX(4px); filter: hue-rotate(45deg); opacity: 0.8; }
            50% { transform: translateX(-4px); filter: hue-rotate(-45deg); opacity: 1; }
            100% { transform: translateX(0); }
        }

        .loader-text {
            color: #7FFF00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-top: 30px;
            text-align: center;
            z-index: 20003;
            text-shadow: 0 0 10px #7FFF00;
        }

        /* --- 全体のデザイン --- */
        body {
            margin: 0; padding: 0; text-align: center; font-family: sans-serif;
            background-color: #333; color: #ffffff;
            overflow-x: hidden;
            /* ロード演出なしのため、最初から表示 */
            opacity: 1;
        }

        h1 {
            background-color: rgba(0, 0, 0, 0.8); 
            color: #7FFF00; padding: 25px; margin: 0 0 10px 0;
            font-size: 1.8rem; border-bottom: 4px solid #7FFF00;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; /* タップ時に青く選択されないようにする */
            cursor: pointer;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }

        .expandable {
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover; 
            cursor: pointer; border-radius: 4px; transition: 0.3s; background: #000;
            /* スマホでの長押し保存を禁止（解除コマンド前） */
            -webkit-touch-callout: none;
        }
        img.expandable { border: 3px solid #fff; }
        video.expandable { border: 3px solid #7FFF00; box-shadow: 0 0 15px rgba(127, 255, 0, 0.5); }
        .expandable:hover { transform: scale(1.05); }

        /* モーダル設定 */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; 
        }
        .modal-content { max-width: 85vw; max-height: 85vh; object-fit: contain; z-index: 10000; }
        .close { position: absolute; top: 15px; right: 25px; color: #fff; font-size: 50px; cursor: pointer; z-index: 10010; }
        
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            color: rgba(255, 255, 255, 0.4); font-size: 70px; 
            cursor: pointer; padding: 30px; z-index: 10010; transition: 0.3s;
            user-select: none;
        }
        .nav-btn:hover { color: #7FFF00; transform: translateY(-50%) scale(1.1); }
        .prev { left: 10px; }
        .next { right: 10px; }

        @media (max-width: 600px) { 
            .nav-btn { font-size: 45px; padding: 10px; }
            .prev { left: 5px; }
            .next { right: 5px; }
            .modal-content { max-width: 95vw; }
        }
        .show { display: flex !important; }

        /* 管理者モード時のスタイル（保存可能にする） */
        body.admin-mode .expandable {
            -webkit-touch-callout: default !important;
        }
    </style>
</head>
<body>

<div id="modal" class="modal">
    <span class="close" id="closeBtn">&times;</span>
    <span class="nav-btn prev" id="prevBtn">&#10094;</span>
    <div id="modal-content-wrapper" style="display:contents;"></div>
    <span class="nav-btn next" id="nextBtn">&#10095;</span>
</div>

<script>
    const title = document.getElementById("galleryTitle");
    const overlay = document.getElementById("loading-overlay");
    const msg = document.getElementById("loader-msg");
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const items = Array.from(document.querySelectorAll(".expandable"));
    
    let adminMode = false;
    let tapCount = 0;
    let tapTimer;

    // --- 1. タイトル3タップ解除機能 ---
    title.addEventListener("click", function() {
        tapCount++;
        clearTimeout(tapTimer);
        
        // 0.5秒以内に次のタップがない場合はリセット
        tapTimer = setTimeout(() => { tapCount = 0; }, 500);

        if (tapCount === 3) {
            adminMode = true;
            document.body.classList.add("admin-mode");
            showCyberUnlockEffect();
            tapCount = 0;
        }
    });

    // --- 2. 右クリック/長押し制限 ---
    document.addEventListener('contextmenu', function(e) {
        if (!adminMode) e.preventDefault();
    }, false);

    // --- 3. 解除演出 (3タップ後のみ) ---
    function showCyberUnlockEffect() {
        overlay.style.display = "flex";
        overlay.style.opacity = "1";
        overlay.classList.add("glitch-flash");

        const scan = document.createElement("div");
        scan.className = "scanline scan-animate";
        overlay.appendChild(scan);

        msg.innerHTML = "<span style='color:#00ffff; font-size:2rem;'>OVERRIDE SUCCESS</span><br><br><span style='color:#7FFF00; font-size:1rem;'>DOWNLOAD UNLOCKED</span>";

        setTimeout(() => {
            overlay.style.opacity = "0";
            setTimeout(() => { 
                overlay.style.display = "none"; 
                overlay.classList.remove("glitch-flash");
                scan.remove();
            }, 1000);
        }, 2500); 
    }

    // --- ギャラリー基本機能 ---
    let currentIndex = 0;
    function updateModalContent(index) {
        currentIndex = index;
        const target = items[currentIndex];
        wrapper.innerHTML = ""; 
        if (target.tagName === "IMG") {
            const fullImage = target.getAttribute("data-full") || target.src;
            wrapper.innerHTML = `<img src="${fullImage}" class="modal-content">`;
        } else {
            const videoSrc = target.src.split('#')[0];
            wrapper.innerHTML = `<video src="${videoSrc}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    items.forEach((item, index) => {
        item.onclick = () => { modal.classList.add("show"); updateModalContent(index); }
    });
    
    document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % items.length; updateModalContent(currentIndex); };
    document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + items.length) % items.length; updateModalContent(currentIndex); };
    document.getElementById("closeBtn").onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); }
    function closeModal() { modal.classList.remove("show"); wrapper.innerHTML = ""; }

    // キーボード操作も一応維持
    document.addEventListener("keydown", function(e) {
        if (!modal.classList.contains("show")) return;
        if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
        if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
        if (e.key === "Escape") closeModal();
    });
</script>
