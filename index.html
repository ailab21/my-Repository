    <script>

    <style>
        /* --- 全体のデザイン --- */
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: sans-serif;
            background-image: url("background.png"); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #333;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        h1 {
            background-color: rgba(0, 0, 0, 0.6); 
            color: #7FFF00;
            padding: 20px;
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            border-bottom: 3px solid #7FFF00;
        }

        /* --- ギャラリー設定 --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 10px;
            justify-content: center; 
            margin: 0 auto;
            max-width: 1200px;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(2, 160px); 
                justify-content: center;
            }
        }

        /* 共通設定 */
        .expandable {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover; 
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.2s; /* 変化をスムーズに */
            box-sizing: border-box;
            border-radius: 4px;
            background-color: #000; 
        }

        /* 画像のみのデザイン（白枠） */
        img.expandable {
            border: 3px solid white;
        }

        /* ★動画のみのデザイン（緑のネオン枠）★ */
        video.expandable {
            border: 3px solid #7FFF00;
            box-shadow: 0 0 15px rgba(127, 255, 0, 0.5); /* ネオンのような光 */
        }

        /* ホバー時の演出（少し浮き上がる） */
        .expandable:hover {
            transform: scale(1.03);
            z-index: 10;
        }
        
        video.expandable:hover {
            box-shadow: 0 0 25px rgba(127, 255, 0, 0.8);
        }

        /* --- 拡大モーダル --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 10px; right: 20px;
            color: white; font-size: 50px; font-weight: bold;
            cursor: pointer;
            z-index: 10001;
            padding: 10px;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            z-index: 10001;
            transition: color 0.3s;
        }
        .nav-btn:hover { color: #7FFF00; }
        .prev { left: 10px; }
        .next { right: 10px; }

        @media (max-width: 600px) {
            .nav-btn { font-size: 40px; padding: 10px; }
        }

        .show { display: flex !important; }
    </style>
</head>

<div id="modal" class="modal">
    <span class="close" id="closeBtn">&times;</span>
    <span class="nav-btn prev" id="prevBtn">&#10094;</span>
    <div id="modal-content-wrapper" style="display:contents;"></div>
    <span class="nav-btn next" id="nextBtn">&#10095;</span>
</div>

<script>
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");
    const items = Array.from(document.querySelectorAll(".expandable"));
    let currentIndex = 0;

    function updateModalContent(index) {
        currentIndex = index;
        const target = items[currentIndex];
        wrapper.innerHTML = ""; 

        if (target.tagName === "IMG") {
            const fullImage = target.getAttribute("data-full") || target.src;
            wrapper.innerHTML = `<img src="${fullImage}" class="modal-content">`;
        } else {
            const videoSrc = target.src.split('#')[0];
            wrapper.innerHTML = `<video src="${videoSrc}" class="modal-content" controls autoplay loop playsinline></video>`;
        }
    }

    items.forEach((item, index) => {
        item.onclick = function() {
            modal.classList.add("show");
            updateModalContent(index);
        }
    });

    document.getElementById("nextBtn").onclick = (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex + 1) % items.length;
        updateModalContent(currentIndex);
    };

    document.getElementById("prevBtn").onclick = (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex - 1 + items.length) % items.length;
        updateModalContent(currentIndex);
    };

    document.getElementById("closeBtn").onclick = closeModal;
    modal.onclick = function(e) {
        if (e.target === modal) closeModal();
    }

    function closeModal() {
        modal.classList.remove("show");
        wrapper.innerHTML = "";
    }

    document.onkeydown = function(e) {
        if (!modal.classList.contains("show")) return;
        if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
        if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
        if (e.key === "Escape") closeModal();
    };
</script>
